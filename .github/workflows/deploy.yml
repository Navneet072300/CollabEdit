name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "infra/terraform/**"
      - "**.md"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (defaults to commit SHA)"
        required: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: collabedit-production-cluster
  NAMESPACE: collabedit

jobs:
  # ── Build & push images ─────────────────────────────────────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag || github.sha }}"
          echo "tag=${TAG:0:7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/collabedit/backend:${{ steps.meta.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/collabedit/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/collabedit/frontend:${{ steps.meta.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/collabedit/frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          no-cache: true

  # ── Deploy to EKS ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Apply namespace
        run: kubectl apply -f infra/k8s/namespace.yaml

      - name: Upsert application secrets
        run: |
          kubectl create secret generic collabedit-secrets \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL }}" \
            --from-literal=CORS_ORIGINS='["${{ secrets.APP_URL }}"]' \
            --from-literal=NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --save-config \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Set image variables and apply manifests
        env:
          BACKEND_IMAGE: "${{ needs.build.outputs.ecr_registry }}/collabedit/backend:${{ needs.build.outputs.image_tag }}"
          FRONTEND_IMAGE: "${{ needs.build.outputs.ecr_registry }}/collabedit/frontend:${{ needs.build.outputs.image_tag }}"
        run: |
          # envsubst replaces ${BACKEND_IMAGE} / ${FRONTEND_IMAGE} in the YAML
          envsubst < infra/k8s/backend/deployment.yaml  | kubectl apply -f -
          envsubst < infra/k8s/frontend/deployment.yaml | kubectl apply -f -
          kubectl apply -f infra/k8s/backend/service.yaml
          kubectl apply -f infra/k8s/frontend/service.yaml
          kubectl apply -f infra/k8s/ingress.yaml
          kubectl apply -f infra/k8s/hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n ${{ env.NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Print ALB URL
        run: |
          echo "ALB hostname:"
          kubectl get ingress collabedit-ingress -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
          echo ""
